brand:
  account_name: "Daily Biology Bits"
  footer_text: "Source linked in caption"
  # Series identity: front-card eyebrow becomes "DAILY BIOLOGY BITS · #<edition>".
  # Edition = per-account count of delivery days (from the ledger), passed at render.
  series_name: "Daily Biology Bits"
  show_episode_number: false
  canvas_width: 1080
  canvas_height: 1350
  render_scale: 2
  margin: 90
  max_cards: 7
  min_cards: 5
  jpeg_quality: 92
  # Front-card backdrop. One name, or a list to rotate across posts (by date).
  # Options: neural circuit waveform orbits hexgrid particles topo grid molecule helix | none
  motif: ["helix", "molecule", "orbits", "topo"]
  hero_style:
    enabled: true
    # Default = cheaper flash tier. To upgrade quality, swap image_model to:
    #   nano-banana-pro-preview     (top quality, ~pro pricing)
    #   gemini-3-pro-image-preview
    image_model: "gemini-3.1-flash-image-preview"
    aspect_ratio: "4:5"
    # Post-generation brand color grade for grid cohesion: duotone the hero toward
    # this account's bg (#0C1A14) + accent (#34D399). 0.35 keeps the subject clear
    # while giving every post one recognizable mint-green signature. Tune 0.0-0.6.
    grade_strength: 0.35
    style: >
      Premium editorial macro 3D render, dark microscopic void, luminous organic
      forms, single mint-green (#34D399) bioluminescent accent, subsurface scattering,
      shallow depth of field, no text, no words, no diagrams.
    # No `concept_guidance` here by design: it's a CS-only experiment for now
    # (see config/brand.cs.yml). Bio heroes follow the hero-image-guide defaults.
    # Add a parallel block here if/when we want the same subject-steering for bio.
  fonts:
    heading: "Inter"
    body: "Inter"
  # Card font sizes for the 1080x1350 canvas (see templates/render.py). Tuned for
  # phone legibility: comfortable body, 1.5 line-height; the densest 280-char body
  # still fits the card height. Bump body_px/heading_px here to scale type globally.
  type_scale:
    title_px: 108         # title-card headline
    title_source_px: 40   # title-card source/venue line
    heading_px: 64        # content-card question heading
    body_px: 50           # content-card body copy
    label_px: 30          # account eyebrow label
    footer_px: 32         # content-card footer / source line
  palette:
    background: "#0C1A14"
    surface: "#14342B"
    text_primary: "#F0FDF4"
    text_muted: "#AECFC0"
    accent: "#34D399"
    card_type_colors:
      hook: "#34D399"
      finding: "#38BDF8"
      method: "#A78BFA"
      context: "#FBBF24"
      limitation: "#F87171"
      source: "#AECFC0"
      next: "#34D399"
  logo_path: ""
