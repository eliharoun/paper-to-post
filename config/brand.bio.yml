brand:
  account_name: "Daily Biology Bits"
  footer_text: "Source linked in caption"
  canvas_width: 1080
  canvas_height: 1350
  render_scale: 2
  margin: 90
  max_cards: 7
  min_cards: 5
  jpeg_quality: 92
  # Front-card backdrop. One name, or a list to rotate across posts (by date).
  # Options: neural circuit waveform orbits hexgrid particles topo grid molecule helix | none
  motif: ["helix", "molecule", "orbits", "topo"]
  fonts:
    heading: "Inter"
    body: "Inter"
  type_scale:
    title_px: 64
    body_px: 42
    footer_px: 28
  palette:
    background: "#0C1A14"
    surface: "#14342B"
    text_primary: "#F0FDF4"
    text_muted: "#94B8A8"
    accent: "#34D399"
    card_type_colors:
      hook: "#34D399"
      finding: "#38BDF8"
      method: "#A78BFA"
      context: "#FBBF24"
      limitation: "#F87171"
      source: "#94B8A8"
      next: "#34D399"
  logo_path: ""
