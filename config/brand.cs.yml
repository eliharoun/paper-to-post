brand:
  account_name: "Daily CS Bits"
  footer_text: "Source linked in caption"
  # Series identity: front-card eyebrow becomes "DAILY CS BITS · #<edition>".
  # Edition = per-account count of delivery days (from the ledger), passed at render.
  series_name: "Daily CS Bits"
  show_episode_number: false
  canvas_width: 1080
  canvas_height: 1350
  render_scale: 2
  margin: 90
  max_cards: 7
  min_cards: 5
  jpeg_quality: 92
  # Front-card backdrop. One name, or a list to rotate across posts (by date).
  # Options: neural circuit waveform orbits hexgrid particles topo grid molecule helix | none
  motif: ["circuit", "neural", "waveform", "grid"]
  hero_style:
    enabled: true
    # Default = cheaper flash tier. To upgrade quality, swap image_model to:
    #   nano-banana-pro-preview     (top quality, ~pro pricing)
    #   gemini-3-pro-image-preview
    image_model: "gemini-3.1-flash-image-preview"
    aspect_ratio: "4:5"
    # Post-generation brand color grade for grid cohesion: duotone the hero toward
    # this account's bg (#0B1220) + accent (#38BDF8). 0.35 keeps the subject clear
    # while giving every post one recognizable cyan-blue signature. Tune 0.0-0.6.
    grade_strength: 0.35
    style: >
      Premium editorial 3D render, dark studio void, single cyan (#38BDF8) accent,
      cinematic volumetric lighting, sharp macro detail, sleek modern tech aesthetic,
      no text, no words, no diagrams.
    # WHAT to depict (concept), separate from the visual `style` above. The hero
    # should make a scroller grasp what THIS paper is about at a glance, not just
    # read as generic "tech". Anchor the scene on the paper's actual object of
    # study (the model, agent, system, data, or task it acts on) and the specific
    # thing it does or finds, so the image is representative of that result and
    # could not be swapped onto a different CS paper. Keep the signature staged,
    # cinematic look; make the subject specific to the finding.
    concept_guidance: >
      Anchor the scene on this paper's actual subject and its specific result so a
      viewer grasps what the paper is about from the image alone. Depict the real
      object of study (the model, agent, tool, dataset, or task) doing or revealing
      the paper's specific finding. Avoid generic tech imagery that could sit on any
      other CS paper; the scene must be recognizably about THIS result.
  fonts:
    heading: "Inter"
    body: "Inter"
  # Card font sizes for the 1080x1350 canvas (see templates/render.py). Tuned for
  # phone legibility: comfortable body, 1.5 line-height; the densest 280-char body
  # still fits the card height. Bump body_px/heading_px here to scale type globally.
  type_scale:
    title_px: 108         # title-card headline
    title_source_px: 40   # title-card source/venue line
    heading_px: 64        # content-card question heading
    body_px: 50           # content-card body copy
    label_px: 30          # account eyebrow label
    footer_px: 32         # content-card footer / source line
  palette:
    background: "#0B1220"
    surface: "#1E293B"
    text_primary: "#F8FAFC"
    text_muted: "#AEB9CC"
    accent: "#38BDF8"
    card_type_colors:
      hook: "#38BDF8"
      finding: "#34D399"
      method: "#A78BFA"
      context: "#FBBF24"
      limitation: "#F87171"
      source: "#AEB9CC"
      next: "#38BDF8"
  logo_path: ""
