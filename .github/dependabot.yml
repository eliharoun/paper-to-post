version: 2
updates:
  # Keep GitHub Actions on supported runtimes automatically, so we don't get
  # caught by Node.js-runtime deprecations (e.g. the Node 20 -> 24 cutover) again.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
